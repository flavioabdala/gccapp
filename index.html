<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Contratos - SEI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .pastel-green { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .pastel-yellow { background-color: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
        .pastel-orange { background-color: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .pastel-red { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .tab-active { border-bottom: 4px solid #3b82f6; font-weight: bold; }
        .contract-card { transition: all 0.3s ease; }
        .contract-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Gestão de Contratos</h1>
                <p class="text-blue-100 text-sm">Monitoramento de Vigências e Aditivos</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToExcel()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2">
                    <i class="fas fa-file-excel"></i> Exportar Excel
                </button>
                <button onclick="removeDuplicates()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-bold transition">
                    Limpar Duplicados
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b bg-gray-50 overflow-x-auto">
            <button onclick="switchTab('ativos')" id="tab-ativos" class="px-6 py-4 text-gray-600 hover:bg-gray-100 transition whitespace-nowrap tab-active">
                Ativos <span id="count-ativos" class="ml-1 text-xs bg-gray-200 px-2 py-0.5 rounded-full">0</span>
            </button>
            <button onclick="switchTab('encerrados')" id="tab-encerrados" class="px-6 py-4 text-gray-600 hover:bg-gray-100 transition whitespace-nowrap">
                Encerrados <span id="count-encerrados" class="ml-1 text-xs bg-gray-200 px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>

        <!-- Content -->
        <div id="contracts-container" class="p-6 space-y-4">
            <!-- Accordions will be injected here -->
            <div class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>
        </div>
    </div>

    <!-- Modal Aditivo/Apostila -->
    <div id="modal-aditivo" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Movimentação de Contrato</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="setMovementType('apostila')" id="btn-type-apostila" class="p-4 border-2 rounded-xl font-bold transition border-blue-500 bg-blue-50 text-blue-700">Apostilamento</button>
                <button onclick="setMovementType('aditivo')" id="btn-type-aditivo" class="p-4 border-2 rounded-xl font-bold transition border-gray-200 text-gray-500">Termo Aditivo</button>
            </div>

            <form id="movement-form" class="space-y-4">
                <div id="fields-apostila" class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tipo de Apostilamento</label>
                        <select class="w-full border rounded-lg p-2 bg-gray-50">
                            <option>Remanejamento</option>
                            <option>Inclusão de DCO</option>
                            <option>Reajuste</option>
                            <option>Outro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Unidades</label>
                        <input type="text" class="w-full border rounded-lg p-2" placeholder="Ex: 10 unidades">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Valor (R$)</label>
                        <input type="number" step="0.01" class="w-full border rounded-lg p-2">
                    </div>
                </div>

                <div id="fields-aditivo" class="hidden grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tipo de Aditivo</label>
                        <select class="w-full border rounded-lg p-2 bg-gray-50">
                            <option>Supressão</option>
                            <option>Acréscimo</option>
                            <option>Renovação</option>
                            <option>Outros</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Número do Aditivo</label>
                        <input type="text" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Nova Data Vigência</label>
                        <input type="date" class="w-full border rounded-lg p-2">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Observações</label>
                    <textarea class="w-full border rounded-lg p-2 h-24"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Salvar Movimentação</button>
            </form>

            <div class="mt-8 border-t pt-6">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-history text-gray-400"></i> Histórico de Movimentações
                </h3>
                <div id="history-list" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                    <!-- History items -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mock Data (Substitua pela sua integração Firebase)
        let contracts = [
            { id: '1', sei: '00100.000123/2023-01', company: 'EMPRESA ALFA LTDA', contractNumber: '10/2023', contractObject: 'Prestação de serviços de limpeza e conservação predial', currentValidityDate: '2024-03-15', value: 150000.00, units: 'Sede Central', status: 'ativo' },
            { id: '2', sei: '00100.000123/2023-01', company: 'EMPRESA ALFA LTDA', contractNumber: '11/2023', contractObject: 'Fornecimento de materiais de escritório', currentValidityDate: '2024-08-20', value: 45000.00, units: 'Almoxarifado', status: 'ativo' },
            { id: '3', sei: '00200.000456/2022-99', company: 'TECNOLOGIA BETA S.A.', contractNumber: '05/2022', contractObject: 'Manutenção de sistemas de TI e suporte técnico', currentValidityDate: '2026-12-31', value: 890000.00, units: 'TI', status: 'ativo' }
        ];

        let currentTab = 'ativos';

        function createLocalDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function getStatusInfo(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const validity = createLocalDate(dateStr);
            const diffTime = validity - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { label: 'Vencido', class: 'pastel-red', key: 'vencido', days: diffDays };
            if (diffDays <= 30) return { label: `${diffDays} dias (Crítico)`, class: 'pastel-orange', key: 'critico', days: diffDays };
            if (diffDays <= 180) return { label: `${diffDays} dias (A Vencer)`, class: 'pastel-yellow', key: 'avencer', days: diffDays };
            return { label: 'Vigente', class: 'pastel-green', key: 'vigente', days: diffDays };
        }

        function renderContracts() {
            const container = document.getElementById('contracts-container');
            container.innerHTML = '';

            const filtered = contracts.filter(c => c.status === (currentTab === 'ativos' ? 'ativo' : 'encerrado'));

            // Agrupar por SEI
            const groups = filtered.reduce((acc, c) => {
                if (!acc[c.sei]) acc[c.sei] = [];
                acc[c.sei].push(c);
                return acc;
            }, {});

            Object.entries(groups).forEach(([sei, group]) => {
                // Determinar status mais crítico do grupo para o cabeçalho
                let mostCritical = { key: 'vigente', days: Infinity };
                group.forEach(c => {
                    const info = getStatusInfo(c.currentValidityDate);
                    const priority = { 'vencido': 0, 'critico': 1, 'avencer': 2, 'vigente': 3 };
                    if (priority[info.key] < priority[mostCritical.key]) {
                        mostCritical = info;
                    } else if (info.key === mostCritical.key && info.days < mostCritical.days) {
                        mostCritical = info;
                    }
                });

                const accordion = document.createElement('div');
                accordion.className = 'border rounded-xl mb-4 overflow-hidden bg-white shadow-sm';

                const headerInfo = getStatusInfo(group[0].currentValidityDate); // Simplificado para o exemplo

                accordion.innerHTML = `
                    <div onclick="toggleAccordion(this)" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 transition">
                        <div class="flex items-center gap-4">
                            <div class="bg-blue-100 p-2 rounded-lg text-blue-600">
                                <i class="fas fa-folder-open"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">${sei}</h3>
                                <p class="text-xs text-gray-500 uppercase truncate max-w-md">${group[0].contractObject.toLowerCase().replace(/^\w/, c => c.toUpperCase())}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm ${mostCritical.class}">
                                ${mostCritical.label}
                            </span>
                            <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-lg text-xs font-bold">(${group.length})</span>
                            <i class="fas fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                        </div>
                    </div>
                    <div class="hidden border-t bg-gray-50 p-4 space-y-4">
                        ${group.map(c => renderContractCard(c)).join('')}
                    </div>
                `;
                container.appendChild(accordion);
            });

            updateCounts();
        }

        function renderContractCard(c) {
            const info = getStatusInfo(c.currentValidityDate);
            return `
                <div class="bg-white p-5 rounded-xl border border-gray-200 contract-card relative">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-xl font-black text-blue-900 mb-1">${c.company}</h4>
                            <div class="flex gap-4 text-sm text-gray-600">
                                <span><strong>Contrato:</strong> ${c.contractNumber}</span>
                                <span><strong>Unidade:</strong> ${c.units}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openModal('${c.id}')" title="Aditivo/Apostila" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition">
                                <i class="fas fa-file-signature"></i>
                            </button>
                            <button title="Editar" class="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100 transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button title="Excluir" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 bg-gray-50 p-3 rounded-lg">
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">Vigência</p>
                            <p class="font-bold text-gray-700">${new Date(c.currentValidityDate).toLocaleDateString('pt-BR')}</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">Valor Total</p>
                            <p class="font-bold text-gray-700">R$ ${c.value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="text-right">
                            <span class="inline-block px-2 py-1 rounded text-[10px] font-bold ${info.class}">
                                ${info.label}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('.fa-chevron-down');
            content.classList.toggle('hidden');
            icon.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-ativos').classList.toggle('tab-active', tab === 'ativos');
            document.getElementById('tab-encerrados').classList.toggle('tab-active', tab === 'encerrados');
            renderContracts();
        }

        function updateCounts() {
            document.getElementById('count-ativos').innerText = contracts.filter(c => c.status === 'ativo').length;
            document.getElementById('count-encerrados').innerText = contracts.filter(c => c.status === 'encerrado').length;
        }

        // Modal Logic
        function openModal(id) {
            document.getElementById('modal-aditivo').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-aditivo').classList.add('hidden');
        }

        function setMovementType(type) {
            const isApostila = type === 'apostila';
            document.getElementById('fields-apostila').classList.toggle('hidden', !isApostila);
            document.getElementById('fields-aditivo').classList.toggle('hidden', isApostila);

            document.getElementById('btn-type-apostila').className = isApostila ? 
                'p-4 border-2 rounded-xl font-bold transition border-blue-500 bg-blue-50 text-blue-700' : 
                'p-4 border-2 rounded-xl font-bold transition border-gray-200 text-gray-500';

            document.getElementById('btn-type-aditivo').className = !isApostila ? 
                'p-4 border-2 rounded-xl font-bold transition border-blue-500 bg-blue-50 text-blue-700' : 
                'p-4 border-2 rounded-xl font-bold transition border-gray-200 text-gray-500';
        }

        // Inicialização
        window.onload = () => {
            setTimeout(renderContracts, 800); // Simula delay de carregamento
        };
    </script>
</body>
</html>
